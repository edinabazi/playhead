name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build assets for, e.g. v0.1.0"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - src/**
      - resources/**
      - electron.vite.config.ts
      - tsconfig.json
      - vitest.config.ts
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ inputs.tag || github.ref }}

      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            version="${tag#v}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
            if git rev-parse "${tag}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          if [ -z "${tag}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm typecheck

  build:
    needs:
      - version
      - test
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      - uses: actions/upload-artifact@v7
        with:
          name: playhead-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish:
    needs:
      - version
      - build
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Playhead ${{ needs.version.outputs.version }}
          draft: ${{ github.event_name != 'workflow_dispatch' }}
          generate_release_notes: true
          files: artifacts/*
          overwrite_files: true
