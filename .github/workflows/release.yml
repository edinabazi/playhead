name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - resources/**
      - electron.vite.config.ts
      - tsconfig.json
      - vitest.config.ts
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck

  build:
    needs:
      - version
      - test
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: macos
          - os: windows-latest
            script: dist:win
            artifact: windows
          - os: ubuntu-latest
            script: dist:linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      - uses: actions/upload-artifact@v4
        with:
          name: playhead-${{ matrix.artifact }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish:
    needs:
      - version
      - build
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Playhead ${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
