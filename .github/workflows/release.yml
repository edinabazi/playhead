name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build assets for, e.g. v0.1.0"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - resources/**
      - electron.vite.config.ts
      - tsconfig.json
      - vitest.config.ts
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ inputs.tag || github.ref }}

      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            version="${tag#v}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
            if git rev-parse "${tag}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          if [ -z "${tag}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck

  build:
    needs:
      - version
      - test
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: macos
          - os: windows-latest
            script: dist:win
            artifact: windows
          - os: ubuntu-latest
            script: dist:linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/playhead-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate_path" \
            -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security find-identity -v -p codesigning "$keychain"
      - run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
          PLAYHEAD_INTEGRATIONS_BROKER_URL: ${{ vars.PLAYHEAD_INTEGRATIONS_BROKER_URL }}
      - name: Notarize and staple DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [ -z "$identity" ]; then
            echo "No Developer ID Application signing identity found."
            security find-identity -v -p codesigning
            exit 1
          fi

          for dmg in release/*.dmg; do
            codesign --sign "$identity" --timestamp --force "$dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose "$dmg"
          done
      - uses: actions/upload-artifact@v7
        with:
          name: playhead-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  publish:
    needs:
      - version
      - build
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Playhead ${{ needs.version.outputs.version }}
          draft: ${{ github.event_name != 'workflow_dispatch' }}
          generate_release_notes: true
          files: artifacts/*
          overwrite_files: true
